name: Build Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Same office host / label pattern as other stackblaze image builds
    # (gh-runner-02, docker + buildx installed).
    runs-on: [self-hosted, kubero]
    steps:
      - uses: actions/checkout@v5

      - name: Reclaim runner disk
        run: bash "$GITHUB_WORKSPACE/.github/scripts/reclaim-runner-disk.sh"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Build frontend
        working-directory: ./front
        run: |
          npm ci
          npm run build-prod

      # Named builder + cleanup:false so BuildKit cache persists on the
      # self-hosted runner (ephemeral builders are deleted in post).
      - uses: docker/setup-buildx-action@v3
        with:
          name: kubero-shared-builder
          cleanup: false

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          # Local buildx cache on the self-hosted runner; avoid type=gha.
